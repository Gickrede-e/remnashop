x-build-secrets: &build-secrets
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  ADMIN_EMAILS: ${ADMIN_EMAILS}
  ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
  NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
  NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME}
  NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  REMNAWAVE_BASE_URL: ${REMNAWAVE_BASE_URL}
  REMNAWAVE_API_TOKEN: ${REMNAWAVE_API_TOKEN}
  YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
  YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
  YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET}
  YOOKASSA_ALLOWED_IPS: ${YOOKASSA_ALLOWED_IPS}
  PLATEGA_API_KEY: ${PLATEGA_API_KEY}
  PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID}
  PLATEGA_WEBHOOK_SECRET: ${PLATEGA_WEBHOOK_SECRET}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_SECURE: ${SMTP_SECURE}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  EMAIL_FROM: ${EMAIL_FROM}
  REFERRAL_REWARD_TYPE: ${REFERRAL_REWARD_TYPE}
  REFERRAL_REWARD_VALUE: ${REFERRAL_REWARD_VALUE}
  CRON_SECRET: ${CRON_SECRET}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: tools
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
      args: *build-secrets
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      target: runner
      args: *build-secrets
    command: ["node", "scripts/worker.mjs"]
    env_file:
      - .env
    environment:
      APP_INTERNAL_URL: http://app:3000
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      app:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
