name: Docker Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: gickrede/remnashop

jobs:
  preflight:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has_dockerhub: ${{ steps.check.outputs.has_dockerhub }}
      has_deploy: ${{ steps.check.outputs.has_deploy }}

    steps:
      - name: Check required secrets
        id: check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "has_dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${DEPLOY_HOST}" ] && [ -n "${DEPLOY_USER}" ] && [ -n "${DEPLOY_SSH_KEY}" ] && [ -n "${DEPLOY_PATH}" ] && [ -n "${DEPLOY_ENV_FILE}" ]; then
            echo "has_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gickvpn?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Production build
        run: npx next build --webpack

  docker:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs:
      - preflight
      - validate
    if: ${{ needs.preflight.outputs.has_dockerhub == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs:
      - preflight
      - docker
    if: ${{ needs.docker.result == 'success' && needs.preflight.outputs.has_deploy == 'true' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          target: ${{ secrets.DEPLOY_PATH }}
          source: docker-compose.hub.yml,Caddyfile
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH,IMAGE_TAG,DEPLOY_HEALTHCHECK_URL
          script: |
            set -euo pipefail
            log_on_failure() {
              docker compose --env-file .env -f docker-compose.hub.yml logs migrate --tail=100 || true
              docker compose --env-file .env -f docker-compose.hub.yml logs app --tail=100 || true
              docker compose --env-file .env -f docker-compose.hub.yml logs worker --tail=100 || true
            }
            trap 'status=$?; if [ "$status" -ne 0 ]; then log_on_failure; fi' EXIT
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            cat > .env.base <<'EOF'
            ${{ secrets.DEPLOY_ENV_FILE }}
            EOF
            grep -v '^APP_IMAGE=' .env.base > .env || true
            printf '\nAPP_IMAGE=%s\n' "$IMAGE_TAG" >> .env
            rm -f .env.base
            chmod 600 .env
            docker compose --env-file .env -f docker-compose.hub.yml pull
            docker compose --env-file .env -f docker-compose.hub.yml up -d --remove-orphans
            docker compose --env-file .env -f docker-compose.hub.yml ps
            if [ -n "${DEPLOY_HEALTHCHECK_URL:-}" ]; then
              curl -fsS "$DEPLOY_HEALTHCHECK_URL"
            fi
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
