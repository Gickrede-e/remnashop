name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Prepare build environment
        run: |
          cat > .env.ci.build <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gickvpn?schema=public
          POSTGRES_DB=gickvpn
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          JWT_SECRET=0123456789abcdef0123456789abcdef
          ADMIN_EMAILS=admin@example.com
          ADMIN_INITIAL_PASSWORD=ci-admin-password
          NEXT_PUBLIC_SITE_URL=https://vpn.example.com
          NEXT_PUBLIC_SITE_NAME=GickShop
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=
          TELEGRAM_BOT_TOKEN=
          REMNAWAVE_BASE_URL=https://panel.example.com
          REMNAWAVE_API_TOKEN=ci-remnawave-token
          YOOKASSA_SHOP_ID=123456
          YOOKASSA_SECRET_KEY=ci-yookassa-secret
          YOOKASSA_WEBHOOK_SECRET=ci-yookassa-webhook
          YOOKASSA_ALLOWED_IPS=
          PLATEGA_API_KEY=ci-platega-key
          PLATEGA_MERCHANT_ID=
          PLATEGA_WEBHOOK_SECRET=ci-platega-webhook
          SMTP_HOST=smtp.example.com
          SMTP_PORT=587
          SMTP_SECURE=false
          SMTP_USER=notifications@example.com
          SMTP_PASS=ci-smtp-password
          EMAIL_FROM=GickShop <notifications@example.com>
          REFERRAL_REWARD_TYPE=FREE_DAYS
          REFERRAL_REWARD_VALUE=3
          CRON_SECRET=0123456789abcdef
          EOF
      - name: Resolve Docker cache flags
        id: docker-cache
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "cache_from=--cache-from=type=registry,ref=gickrede/remnashop:cache" >> "$GITHUB_OUTPUT"
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            echo "cache_to=--cache-to=type=registry,ref=gickrede/remnashop:cache,mode=max" >> "$GITHUB_OUTPUT"
          else
            echo "cache_to=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build runner image
        run: |
          docker buildx build \
            --target runner \
            --build-arg NEXT_PUBLIC_SITE_URL=https://vpn.example.com \
            --build-arg NEXT_PUBLIC_SITE_NAME=GickShop \
            --build-arg NEXT_PUBLIC_TELEGRAM_BOT_USERNAME= \
            --secret id=build_env,src=.env.ci.build \
            ${{ steps.docker-cache.outputs.cache_from }} \
            ${{ steps.docker-cache.outputs.cache_to }} \
            --output type=docker,dest=/tmp/remnashop-runner.tar \
            --tag remnashop-ci:runner \
            .
      - name: Load and validate image size
        run: |
          docker load --input /tmp/remnashop-runner.tar
          size_bytes=$(docker image inspect remnashop-ci:runner --format '{{.Size}}')
          echo "Runner image size: ${size_bytes} bytes"
          test "${size_bytes}" -le 500000000
